version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: foundit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-foundit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-foundit123}
      POSTGRES_DB: ${DB_NAME:-foundit_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      # - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-foundit} -d ${DB_NAME:-foundit_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: foundit-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-aadmin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: foundit-network
