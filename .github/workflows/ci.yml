name: CI

on:
  push:
    branches: [main, ci]
  pull_request:

jobs:
  backend:
    name: Backend (TypeScript Check + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: backend
        run: pnpm lint

      - name: Type check
        working-directory: backend
        run: pnpm typecheck

      - name: Build
        working-directory: backend
        run: pnpm build

  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: foundit-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: foundit-ui
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: foundit-ui
        run: pnpm build

  format:
    name: Prettier Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check .
